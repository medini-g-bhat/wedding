<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-light: #bf953f;  
      --gold-mid: #c8973a;    
      --gold-dark: #9c7e2d;   
      --text-dark: #4a4a4a;   
    }

    body {
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    
    /* Ensure this path matches the actual file name and extension */
    background-image: url('image/creative-flower-designs-in-black-fashion-page-border-background-word-template_41ceb5c2bf__1131_1600.jpg');
    
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    
    color: var(--text-dark);
    line-height: 1.8;
    overflow-x: hidden;
}

    /* ── NAVIGATION ── */
    .nav-container {
      position: absolute; 
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      max-width: 650px;
    }

    .top-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(200, 151, 58, 0.2);
      padding: 12px 35px;
      border-radius: 100px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 10px 30px rgba(156, 126, 45, 0.1);
    }

    .top-nav a {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem; 
      letter-spacing: 2px;
      color: var(--gold-dark);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      transition: all 0.4s ease;
    }

    .top-nav a:hover { color: var(--gold-light); }

    /* ── HERO SECTION ── */
    header.hero {
      position: relative;
      height: 45vh; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 110px 24px 40px 24px; 
      /* background: linear-gradient(135deg, #f4f7f9 0%, #fcf8f2 50%, #f2f6f8 100%); */
       background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.3)), /* Dark overlay for text contrast */
                url('image/images.jfif') no-repeat center center; /* REPLACE WITH YOUR IMAGE URL */
            background-size: cover;
            overflow: hidden;

    }

    header.hero::before, .header-bottom-bar {
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), #e2b96a, var(--gold-mid), transparent);
    }
    header.hero::before { top: 0; }
    .header-bottom-bar { bottom: 0; }

    header.hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 6px;
      /* color: var(--gold-dark);  */
      color: white;
      text-transform: uppercase;
      margin-bottom: 15px;
      white-space: nowrap; 
      animation: floatingNames 4s ease-in-out infinite alternate;
    }

    header.hero p {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem; 
      letter-spacing: 8px;
      text-transform: uppercase;
      /* color: var(--gold-dark);  */
      color: white;
      font-weight: 500;
      opacity: 0.8;
      white-space: nowrap;
    }

    /* ── RSVP CONTAINER ── */
    .rsvp-section { padding: 60px 20px; display: flex; justify-content: center; }
    
    .rsvp-card { 
      width: 100%; 
      max-width: 500px; 
      padding: 40px; 
      background-color: #fcf9f2; 
      border: 1px solid rgba(200, 151, 58, 0.3); 
      border-radius: 20px; 
      box-shadow: 0 15px 40px rgba(156, 126, 45, 0.08);
       background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.3)), /* Dark overlay for text contrast */
                url('image/images.jfif') no-repeat center center; /* REPLACE WITH YOUR IMAGE URL */
            background-size: cover;
            overflow: hidden; 
    }

    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: white; margin-bottom: 8px; font-weight: 600; }
    
    input, select { 
      width: 100%; 
      padding: 12px; 
      border: 1px solid rgba(200, 151, 58, 0.2); 
      border-radius: 8px; 
      font-family: 'Montserrat', sans-serif; 
      font-size: 0.9rem;
      color: #4a4a4a; 
      background-color: #ffffff; 
    }
    
    .submit-btn { width: 100%; padding: 15px; background: var(--gold-dark); color: #fff; border: none; border-radius: 50px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
    .submit-btn:hover { background: var(--gold-mid); }

    /* ── SUCCESS MESSAGE ── */
    #message-box { display: none; text-align: center; }
    .msg-title { font-family: 'Cinzel', serif; color: var(--gold-dark); margin-bottom: 10px; }
    .msg-text { font-size: 0.9rem; line-height: 1.6; color: #5a5a5a; }

    footer {
      background: #ffffff;
      text-align: center;
      padding: 50px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 4px;
      color: var(--gold-dark);
      border-top: 1px solid rgba(200, 151, 58, 0.15);
    }
    footer span { color: var(--gold-mid); font-size: 1.1rem; }

    @keyframes floatingNames { from { transform: translateY(0); } to { transform: translateY(-12px); } }

    @media (max-width: 768px) {
      body {
        /* 'contain' ensures the WHOLE image is visible, including corners */
        background-size: contain; 
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: scroll;
        background-color: #ffffff; /* Set a fallback color for the edges */
    }
      header.hero {
        height: 30vh; /* Reduced from default/inherited */
        padding: 40px 15px 20px 15px;
    }
      header.hero h1 { font-size: 1.8rem; letter-spacing: 3px; }
      .nav-container { top: 30px; width: 95%; }
      .top-nav a { font-size: 0.85rem; padding: 5px 8px; }
    }
  </style>
</head>
<body>

<div class="nav-container">
  <nav class="top-nav">
    <a href="main.html">Home</a>
    <a href="events.html">Events</a>
    <a href="memories.html">Memories</a>
  </nav>
</div>

<header class="hero">
  <h1>Will You Join Us?</h1>
  <p>Kindly RSVP by Nov 15</p>
  <div class="header-bottom-bar"></div>
</header>

<section class="rsvp-section">
  <div class="rsvp-card">
    <form id="rsvpForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="guest-name" name="guestName" placeholder="Enter your name" required>
      </div>
      <div class="form-group">
        <label>Will you be attending?</label>
        <select id="attending" name="isAttending" required>
          <option value="" disabled selected>Will you be attending?</option>
          <option value="yes">Accept with Pleasure</option>
          <option value="no">Decline with Regret</option>
        </select>
      </div>
      <div class="form-group" id="guest-count-group">
        <label>Number of Guests</label>
        <input type="number" name="guestCount" min="1" max="10" value="1">
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Send RSVP</button>
    </form>

    <div id="message-box">
      <h2 class="msg-title" id="response-title">Thank You</h2>
      <p class="msg-text" id="response-text"></p>
    </div>
  </div>
</section>

<footer>
  With <span>♥</span> from Sampreeth & Medini
</footer>

<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbzK6mvjLIfnOcz5c1BkbtZ1c8pWyBvR5yt7gLN5U_5QzeCCy9y75YwsjNGWf-qjn6epLQ/exec'; 
  const form = document.getElementById('rsvpForm');
  const submitBtn = document.getElementById('submitBtn');
  const messageBox = document.getElementById('message-box');
  const responseTitle = document.getElementById('response-title');
  const responseText = document.getElementById('response-text');
  const attendingSelect = document.getElementById('attending');
  const guestGroup = document.getElementById('guest-count-group');

  attendingSelect.addEventListener('change', () => {
    guestGroup.style.display = attendingSelect.value === 'no' ? 'none' : 'block';
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.innerText = "Processing...";

    const name = document.getElementById('guest-name').value;
    const status = attendingSelect.value;

    fetch(scriptURL, { method: 'POST', body: new FormData(form) })
    .then(() => {
      form.style.display = 'none';
      messageBox.style.display = 'block';
      if (status === 'yes') {
        responseTitle.innerText = "Joyful News!";
        responseText.innerText = `We are so excited to celebrate with you, ${name}! Your presence will make our day truly special.`;
      } else {
        responseTitle.innerText = "We'll Miss You";
        responseText.innerText = `Thank you for letting us know, ${name}. We are sorry you can't join us, but we'll be thinking of you!`;
      }
    })
    .catch(error => {
      submitBtn.disabled = false;
      submitBtn.innerText = "Send RSVP";
      alert("Something went wrong. Please try again.");
    });
  });
</script>

</body>
</html>
