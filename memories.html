<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Memories · Sampreeth & Medini</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-light: #bf953f;  
      --gold-mid: #c8973a;    
      --gold-dark: #9c7e2d;   
      --text-dark: #4a4a4a;   
      --bg-soft: #fcf9f2;    
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: #ffffff;
      color: var(--text-dark);
      overflow-x: hidden;
    }

    /* ── NAVIGATION ── */
    .nav-container {
      position: absolute; 
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: 90%;
      max-width: 650px;
    }

    .top-nav {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(200, 151, 58, 0.2);
      padding: 12px 35px;
      border-radius: 100px;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 10px 30px rgba(156, 126, 45, 0.1);
    }

    .top-nav a {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem; 
      letter-spacing: 2px;
      color: var(--gold-dark);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      transition: all 0.4s ease;
    }

    .top-nav a:hover { color: var(--gold-light); }

    /* ── HERO SECTION ── */
    header.hero {
      position: relative;
      height: 40vh; 
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 110px 24px 40px 24px; 
      background: linear-gradient(135deg, #f4f7f9 0%, #fcf8f2 50%, #f2f6f8 100%);
       background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.3)), /* Dark overlay for text contrast */
                url('image/images.jfif') no-repeat center center; /* REPLACE WITH YOUR IMAGE URL */
            background-size: cover;
            overflow: hidden;
    }

    header.hero::before, .header-bottom-bar {
      content: "";
      position: absolute;
      left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), #e2b96a, var(--gold-mid), transparent);
    }
    header.hero::before { top: 0; }
    .header-bottom-bar { bottom: 0; }

    header.hero h1 {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      font-weight: 400;
      letter-spacing: 6px;
      color: white; 
      text-transform: uppercase;
      margin-bottom: 10px;
      white-space: nowrap;
      animation: floatingNames 4s ease-in-out infinite alternate;
    }

    header.hero p {
      font-family: 'Cinzel', serif;
      font-size: 0.60rem; 
      letter-spacing: 3px;
      text-transform: uppercase;
      color: white; 
      font-weight: 500;
      opacity: 0.7;
      white-space: nowrap; 
    }

    @keyframes floatingNames { from { transform: translateY(0); } to { transform: translateY(-12px); } }

    /* ── GALLERY GRID ── */
    .gallery-container {
      max-width: 1000px;
      margin: 60px auto 100px;
      padding: 0 20px;
      columns: 2 300px;
      column-gap: 30px;
    }

    .gallery-item {
      display: inline-block;
      width: 100%;
      margin-bottom: 30px;
      border-radius: 20px;
      overflow: hidden;
      background-color: var(--bg-soft);
      border: 1px solid rgba(200, 151, 58, 0.3);
      box-shadow: 0 10px 20px rgba(156, 126, 45, 0.15);
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      background: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.3)), /* Dark overlay for text contrast */
                url('image/images.jfif') no-repeat center center; /* REPLACE WITH YOUR IMAGE URL */
            background-size: cover;
            overflow: hidden;
    }

    .gallery-item:hover { 
      transform: translateY(-15px); 
      box-shadow: 0 20px 40px rgba(191, 149, 63, 0.4); 
      border-color: var(--gold-light);
    }
    
    .gallery-item:hover img { 
      filter: brightness(1.15) contrast(1.05);
      transform: scale(1.03);
    }

    .gallery-item img { width: 100%; display: block; transition: all 0.4s ease; }
    .photo-caption { padding: 25px; text-align: center; font-family: 'Cinzel', serif; color: white; font-size: 1rem; font-weight: 600; letter-spacing: 3px; transition: color 0.4s ease; }
    .gallery-item:hover .photo-caption { color: var(--gold-light); }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 50px 20px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 4px;
      color: var(--gold-dark);
      border-top: 1px solid rgba(200, 151, 58, 0.15);
    }
    footer span { color: var(--gold-mid); font-size: 1.1rem; }

    @media (max-width: 768px) {
      header.hero {hegight: 45vh;}
      header.hero h1 { font-size: 1.8rem; letter-spacing: 3px; }
      header.hero p { letter-spacing: 4px; }
      .nav-container { top: 30px; width: 95%; }
      .top-nav a { font-size: 0.85rem; padding: 5px 8px; }
      .gallery-container { columns: 1; }
    }
     @media (max-width: 480px) {
      header.hero { height: 35vh; padding-top: 90px; } 
  </style>
</head>
